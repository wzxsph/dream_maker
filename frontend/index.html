<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>造梦</title>
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/effects.css" />
  </head>
  <body data-theme="dark">
    <div id="app">
      <section id="homePage" class="page">
        <div class="brand-mark" aria-hidden="true">造梦</div>
        <h1>造梦</h1>
        <p class="tagline">一句话开局，随时改写命运。</p>

        <textarea
          id="promptInput"
          maxlength="200"
          placeholder="输入你的脑洞，例如：我重生回到了假千金把我推下楼梯那天"
        ></textarea>

        <button id="generateBtn" class="primary-btn">生成我的互动短剧</button>

        <div id="hotPrompts" aria-label="热门脑洞">
          <button class="hot-prompt">我重生回到了假千金把我推下楼梯那天</button>
          <button class="hot-prompt">我觉醒了能听见心声的系统</button>
          <button class="hot-prompt">午夜宿舍门外有人敲门</button>
          <button class="hot-prompt">我穿成了反派的白月光</button>
        </div>
      </section>

      <section id="introPage" class="page hidden">
        <div id="introShell">
          <div id="introBadge">故事即将开始</div>
          <h1 id="introTitle"></h1>
          <div id="introSynopsis"></div>
          <button id="beginBtn" class="primary-btn">开始造梦</button>
          <p id="countdownHint" class="countdown-hint">生成中，请稍候...</p>
        </div>
      </section>

      <section id="storyPage" class="page hidden">
        <div id="storyShell">
          <div id="storyTitle"></div>
          <div id="storyText"></div>
          <div id="choices"></div>
          <div id="endingActions" class="hidden">
            <p>故事结束</p>
            <button id="backHomeBtn" class="secondary-btn">重新造梦</button>
          </div>
        </div>
      </section>

      <div id="loadingOverlay" class="overlay hidden">
        <div class="loading-card">
          <div class="loading-spinner"></div>
          <p id="loadingText">正在构建梦境世界...</p>
        </div>
      </div>

      <div id="continuePanel" class="overlay hidden">
        <div class="modal-card">
          <h2>下一幕即将展开</h2>
          <p>继续当前剧情，或亲手改写命运。</p>
          <button id="continueBtn" class="primary-btn">继续当前剧情</button>
          <button id="rewriteBtn" class="secondary-btn">改写接下来的剧情</button>
          <button id="cancelContinueBtn" class="ghost-btn">取消</button>
        </div>
      </div>

      <div id="rewriteModal" class="overlay hidden">
        <div class="modal-card">
          <h2>改写命运</h2>
          <textarea
            id="interventionInput"
            maxlength="100"
            placeholder="你想让接下来发生什么？例如：我要觉醒能听见所有人心声的系统"
          ></textarea>
          <button id="submitRewriteBtn" class="primary-btn">加入剧情</button>
          <button id="skipRewriteBtn" class="secondary-btn">算了，继续当前剧情</button>
        </div>
      </div>

      <div id="adModal" class="overlay hidden">
        <div class="modal-card ad-card">
          <h2 id="adTitle">观看广告，解锁剧情</h2>
          <p id="adDescription">世界意志正在干扰你的命运。</p>
          <p id="adCountdown">5</p>
          <button id="adUnlockBtn" class="primary-btn" disabled>解锁剧情</button>
        </div>
      </div>

      <div id="toast" class="toast hidden"></div>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
